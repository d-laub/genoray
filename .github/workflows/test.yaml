name: Test

on:
  pull_request:
    branches:
      - main
      - svar-2
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    name: "Run test across all Python versions"
    strategy:
      fail-fast: false
      matrix:
        environment: [py310, py311, py312, py313, py314]
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.70.2
          environments: ${{ matrix.environment }}
      - name: Test
        run: pixi run -e ${{ matrix.environment }} test

  rust-test:
    runs-on: ubuntu-latest
    name: "Run Rust test suite"
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.70.2
          environments: lint
      - name: Cargo check (query-core, no conversion)
        run: pixi run -e lint check-core
      - name: Cargo test
        run: pixi run -e lint test-rust
