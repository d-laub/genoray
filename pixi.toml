[workspace]
name = "genoray"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64"]

[environments]
default = ["py310"]
doc = ["doc", "py312"]
py310 = ["py310"]
py311 = ["py311"]
py312 = ["py312"]
py313 = ["py313"]
sbox = ["sbox", "py310"]
# isolated env for linting: no editable genoray build (and thus no Rust compile)
lint = { features = ["lint"], no-default-feature = true }

[dependencies]
uv = "*"
bcftools = "*"
plink2 = "*"
commitizen = "*"
prek = "*"
ruff = "*"
memray = ">=1.12.0,<2"
pytest = "*"
pytest-cases = "*"
ipykernel = "*"
ipywidgets = "*"
icecream = "*"
typing-extensions = "<4.15"
rust = ">=1.93.1,<1.94"
maturin = ">=1.12.0,<2"
pip = ">=26.0.1,<27"
# Build toolchain for the Rust extension: cxx-compiler builds vendored htslib (via
# hts-sys), clangdev provides libclang for rust-htslib's mandatory bindgen step.
cxx-compiler = "*"
# Pin libclang: newer majors (e.g. 22) make bindgen 0.69 emit struct layouts that
# rust-htslib 1.0 doesn't match (nested anon fields). 18 generates compatible bindings.
clangdev = "18.*"

[activation.env]
# rust-htslib's bindgen step needs to locate libclang (provided by clangdev).
LIBCLANG_PATH = "$CONDA_PREFIX/lib"

[pypi-dependencies]
genoray = { path = ".", editable = true, extras = ["cli"] }
# dev deps
seaborn = "*"

[tasks]
gen = "sh tests/data/gen_from_vcf.sh"
test = { cmd = "pytest tests", depends-on = "gen" }
prek-install = "prek install -t pre-commit -t pre-push"
bump-dry = "cz bump --dry-run"

[feature.lint.dependencies]
prek = "*"
# Toolchain so the cargo fmt/check/clippy hooks can run here without building the
# editable genoray wheel: rust + python (pyo3 build script) + the htslib build deps.
rust = ">=1.93.1,<1.94"
python = "*"
cxx-compiler = "*"
clangdev = "18.*"

[feature.lint.activation.env]
# lint is no-default-feature, so it doesn't inherit the top-level LIBCLANG_PATH.
LIBCLANG_PATH = "$CONDA_PREFIX/lib"

[feature.lint.tasks]
lint = "prek run --all-files --show-diff-on-failure"

[feature.doc.dependencies]
sphinx = "*"
sphinx-book-theme = "*"
sphinx-autobuild = "*"
sphinx-autodoc-typehints = "*"
myst-parser = "*"

[feature.doc.tasks]
doc = { cmd = "make clean && make html", cwd = "docs" }

[feature.py310.dependencies]
python = "3.10.*"

[feature.py310.pypi-dependencies]
# min version deps
numpy = "==1.26.*"
pandas = "==2.2.*"
polars = "==1.37.*"
polars-bio = "==0.20.*"
tqdm = "==4.67.*"
typing-extensions = "==4.14.*"
more-itertools = "==10.0.*"
cyvcf2 = "==0.31.*"
hirola = "==0.3.*"
pgenlib = "==0.91.*"
pyranges = "==0.1.*"
pyarrow = "==21.0.*"
phantom-types = "==3.0.*"
loguru = "==0.7.*"
attrs = "*"
awkward = "*"
numba = "*"
seqpro = "==0.8.*"
zstandard = "*"
pydantic = "*"
oxbow = "==0.5.*"
joblib = "==1.4.*"
joblib-progress = "==1.0.*"
filelock = "==3.0.*"

[feature.py311.dependencies]
python = "3.11.*"

[feature.py312.dependencies]
python = "3.12.*"

[feature.py313.dependencies]
python = "3.13.*"

[feature.py313.pypi-dependencies]
numpy = ">=2"

[feature.sbox.pypi-dependencies]
fast-histogram = "*"

[feature.sbox.tasks]
i-kernel = "ipython kernel install --user --name genoray"
