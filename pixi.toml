[workspace]
name = "genoray"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64", 'osx-arm64']

[environments]
default = ["py310"]
doc = ["doc", "py312"]
py310 = ["py310"]
py311 = ["py311"]
py312 = ["py312"]
py313 = ["py313"]
sbox = ["sbox", "py310"]
# isolated env for linting: no editable genoray build (and thus no Rust compile)
lint = { features = ["lint"], no-default-feature = true }
sigprofiler = ["sigprofiler"]

[dependencies]
uv = "*"
bcftools = "*"
# `samtools faidx` builds the reference `.fai` in the SVAR2 conversion tests.
samtools = "*"
commitizen = "*"
prek = "*"
ruff = "*"
pyrefly = "*"
memray = ">=1.12.0,<2"
# pytest-cases 3.10.1 (latest) is incompatible with pytest 9 (IdMaker signature change);
# cap until a pytest-9-compatible pytest-cases is released.
pytest = "<9"
pytest-cases = "*"
ipykernel = "*"
ipywidgets = "*"
icecream = "*"
typing-extensions = "<4.15"
rust = ">=1.93.1,<1.94"
maturin = ">=1.12.0,<2"
pip = ">=26.0.1,<27"
# Build toolchain for the Rust extension: cxx-compiler builds vendored htslib (via
# hts-sys), clangdev provides libclang for rust-htslib's mandatory bindgen step.
cxx-compiler = "*"
# Pin libclang: newer majors (e.g. 22) make bindgen 0.69 emit struct layouts that
# rust-htslib 1.0 doesn't match (nested anon fields). 18 generates compatible bindings.
clangdev = "18.*"
# The conda compiler uses the conda sysroot, so source-built pypi deps (e.g. pgenlib)
# need dev headers from conda rather than the system: zlib provides zlib.h.
zlib = "*"
pysam = ">=0.24.0,<0.25"

[activation.env]
# rust-htslib's bindgen step needs to locate libclang (provided by clangdev).
LIBCLANG_PATH = "$CONDA_PREFIX/lib"

[target.linux-64.dependencies]
# needs to be installed manually for osx-arm64
plink2 = "*"

[pypi-dependencies]
genoray = { path = ".", editable = true }
# dev deps
seaborn = "*"
pooch = "*"
vcfixture = ">=0.6.0,<0.7"

[tasks]
gen = "sh tests/data/gen_from_vcf.sh"
test = { cmd = "pytest tests", depends-on = "gen" }
typecheck = "pyrefly check python/genoray"
prek-install = "prek install -t pre-commit -t pre-push -t commit-msg"
bump-dry = "cz bump --dry-run"

[feature.lint.dependencies]
prek = "*"
# Toolchain so the cargo fmt/check/clippy hooks can run here without building the
# editable genoray wheel: rust + python (pyo3 build script) + the htslib build deps.
rust = ">=1.93.1,<1.94"
python = "*"
cxx-compiler = "*"
clangdev = "18.*"
# `cargo test` (test-rust) runs the py_convert unit tests, whose numpy-crate array
# API imports Python's `numpy` at runtime — needed even though lint builds no wheel.
numpy = "*"
# The Rust e2e tests shell out to `bcftools norm` as a left-align/normalize oracle.
bcftools = "*"

[feature.lint.activation.env]
# lint is no-default-feature, so it doesn't inherit the top-level LIBCLANG_PATH.
LIBCLANG_PATH = "$CONDA_PREFIX/lib"

[feature.lint.tasks]
lint = "prek run --all-files --show-diff-on-failure"
# Rust test suite. `--no-default-features` drops `extension-module` (whose
# pyo3 symbols don't link into a standalone test binary — `undefined symbol:
# _Py_Dealloc`); `--features conversion` keeps rust-htslib for the e2e tests.
# Runs in `lint` (no editable-wheel build, full Rust + htslib toolchain).
test-rust = "cargo test --no-default-features --features conversion"

[feature.doc.dependencies]
sphinx = "*"
sphinx-book-theme = "*"
sphinx-autobuild = "*"
sphinx-autodoc-typehints = "*"
myst-parser = "*"

[feature.doc.tasks]
doc = { cmd = "make clean && make html", cwd = "docs" }

[feature.py310.dependencies]
python = "3.10.*"

[feature.py310.pypi-dependencies]
# min version deps
numpy = "==1.26.*"
pandas = "==2.2.*"
polars = "==1.37.*"
polars-bio = "==0.20.*"
tqdm = "==4.67.*"
typing-extensions = "==4.14.*"
more-itertools = "==10.0.*"
cyvcf2 = "==0.31.*"
hirola = "==0.3.*"
pgenlib = "==0.91.*"
pyranges = "==0.1.*"
pyarrow = "==21.0.*"
phantom-types = "==3.0.*"
loguru = "==0.7.*"
attrs = "*"
awkward = "*"
numba = "*"
seqpro = "==0.21.1"
zstandard = "*"
pydantic = "*"
oxbow = "==0.5.*"
joblib = "==1.4.*"
joblib-progress = "==1.0.*"
filelock = "==3.0.*"

[feature.py311.dependencies]
python = "3.11.*"

[feature.py312.dependencies]
python = "3.12.*"

[feature.py313.dependencies]
python = "3.13.*"

[feature.py313.pypi-dependencies]
numpy = ">=2"

[feature.sbox.pypi-dependencies]
fast-histogram = "*"

[feature.sbox.tasks]
i-kernel = "ipython kernel install --user --name genoray"

[feature.sigprofiler.dependencies]
python = "3.10.*"

[feature.sigprofiler.pypi-dependencies]
sigprofilermatrixgenerator = ">=1.3, <2"
sigprofilerassignment = "*"
