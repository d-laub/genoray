repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v6.0.0
  hooks:
  - id: check-merge-conflict
  - id: debug-statements
  - id: mixed-line-ending
  - id: check-case-conflict
  - id: check-yaml
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.14.14
  hooks:
  - id: ruff
  - id: ruff-format
- repo: https://github.com/commitizen-tools/commitizen
  rev: v4.12.1
  hooks:
  - id: commitizen
    stages: [commit-msg]
- repo: local
  hooks:
  - id: cargo-fmt
    name: cargo fmt
    entry: cargo fmt --all -- --check
    language: system
    types: [rust]
    pass_filenames: false
    stages: [pre-commit]
  - id: cargo-check
    name: cargo check
    entry: cargo check --all-targets
    language: system
    types: [rust]
    pass_filenames: false
    stages: [pre-commit]
  - id: cargo-clippy
    name: cargo clippy
    entry: cargo clippy --all-targets -- -D warnings
    language: system
    types: [rust]
    pass_filenames: false
    stages: [pre-commit]
